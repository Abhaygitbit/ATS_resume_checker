<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — ATS Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="app-page">

<nav class="sidebar">
  <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">ATS<strong>Pro</strong></span></div>
  <ul class="sidebar-nav">
    <li class="nav-item"><a href="/dashboard">📊 Dashboard</a></li>
    <li class="nav-item"><a href="/upload">📤 Analyze Resume</a></li>
    <li class="nav-item active"><a href="/admin">🛡️ Admin Panel</a></li>
  </ul>
  <div class="sidebar-footer">
    <div class="user-chip">
      <img id="user-photo" src="" alt="" class="user-avatar" onerror="this.style.display='none'">
      <div><div id="user-name" class="user-chip-name">—</div></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
  </div>
</nav>

<main class="app-main">
  <header class="app-header">
    <h1 class="page-title">🛡️ Admin Panel</h1>
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('users')">Users</button>
      <button class="tab-btn" onclick="switchTab('resumes')">Resumes</button>
    </div>
  </header>

  <!-- Platform Stats -->
  <div class="stats-row" id="admin-stats">
    <div class="stat-card"><div class="stat-card-num" id="a-users">—</div><div class="stat-card-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-card-num" id="a-resumes">—</div><div class="stat-card-label">Total Resumes</div></div>
    <div class="stat-card"><div class="stat-card-num" id="a-analyzed">—</div><div class="stat-card-label">Analyzed</div></div>
    <div class="stat-card"><div class="stat-card-num" id="a-avg">—</div><div class="stat-card-label">Avg ATS Score</div></div>
  </div>

  <!-- Users Tab -->
  <div id="tab-users" class="tab-content active">
    <div class="section">
      <h2 class="section-title">All Users</h2>
      <div id="users-table" class="table-wrap">
        <div class="loading-state">Loading users…</div>
      </div>
    </div>
  </div>

  <!-- Resumes Tab -->
  <div id="tab-resumes" class="tab-content">
    <div class="section">
      <h2 class="section-title">All Resumes</h2>
      <div id="resumes-table" class="table-wrap">
        <div class="loading-state">Loading resumes…</div>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {{ firebase_config | tojson }};
if (firebaseConfig.apiKey) firebase.initializeApp(firebaseConfig);

async function checkAuth() {
  const res = await fetch('/api/auth/me', {credentials:'include'});
  const d = await res.json();
  if (!d.authenticated) { window.location.href = '/'; return; }
  if (!d.user.isAdmin) { window.location.href = '/dashboard'; return; }
  document.getElementById('user-name').textContent = d.user.name;
  document.getElementById('user-photo').src = d.user.photo || '';
}

async function loadStats() {
  const res = await fetch('/api/admin/stats', {credentials:'include'});
  const d = await res.json();
  document.getElementById('a-users').textContent = d.total_users;
  document.getElementById('a-resumes').textContent = d.total_resumes;
  document.getElementById('a-analyzed').textContent = d.analyzed;
  document.getElementById('a-avg').textContent = d.avg_ats_score + '%';
}

async function loadUsers() {
  const res = await fetch('/api/admin/users', {credentials:'include'});
  const users = await res.json();
  const wrap = document.getElementById('users-table');
  if (!users.length) { wrap.innerHTML = '<div class="empty-state">No users yet.</div>'; return; }
  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Resumes</th><th>Admin</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td><span class="count-badge">${u.resume_count}</span></td>
            <td><span class="status-tag ${u.is_admin ? 'status-analyzed' : 'status-pending'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
            <td>${u.created_at}</td>
            <td class="action-cell">
              <button class="btn btn-ghost btn-sm" onclick="toggleAdmin(${u.id})">Toggle Admin</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

async function loadResumes() {
  const res = await fetch('/api/admin/resumes', {credentials:'include'});
  const resumes = await res.json();
  const wrap = document.getElementById('resumes-table');
  if (!resumes.length) { wrap.innerHTML = '<div class="empty-state">No resumes yet.</div>'; return; }
  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr><th>#</th><th>User</th><th>File</th><th>ATS Score</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>
        ${resumes.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.user_email}</td>
            <td>${r.original_name}</td>
            <td><span class="score-badge ${scoreBadgeClass(r.ats_score)}">${r.ats_score ? r.ats_score.toFixed(1)+'%' : '—'}</span></td>
            <td><span class="status-tag status-${r.status}">${r.status}</span></td>
            <td>${r.created_at}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function scoreBadgeClass(s) {
  if (!s) return 'score-na';
  if (s >= 75) return 'score-high';
  if (s >= 50) return 'score-mid';
  return 'score-low';
}

async function toggleAdmin(uid) {
  await fetch(`/api/admin/users/${uid}/toggle-admin`, {method:'POST', credentials:'include'});
  loadUsers(); loadStats();
}

async function deleteUser(uid) {
  if (!confirm('Delete this user and ALL their resumes?')) return;
  await fetch(`/api/admin/users/${uid}`, {method:'DELETE', credentials:'include'});
  loadUsers(); loadStats();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
}

async function logout() {
  await fetch('/api/auth/logout', {method:'POST', credentials:'include'});
  window.location.href = '/';
}

checkAuth();
loadStats();
loadUsers();
loadResumes();
</script>
</body>
</html>
